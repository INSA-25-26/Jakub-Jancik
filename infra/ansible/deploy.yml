---
- name: Provision VM and deploy telco churn service
  hosts: all
  become: true
  vars:
    docker_packages:
      - docker.io
      - docker-compose-v2
      - awscli
    monitoring_images:
      - prom/prometheus:latest
      - quay.io/prometheus/node-exporter:latest
      - grafana/loki:2.9.8
      - grafana/promtail:2.9.8
      - grafana/grafana:latest
      - caddy:2

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Authenticate Docker to ECR using instance role
      ansible.builtin.shell: >-
        aws ecr get-login-password --region {{ aws_region }} |
        docker login --username AWS --password-stdin {{ app_image.split('/')[0] }}
      changed_when: false

    - name: Pull app image
      ansible.builtin.command:
        cmd: "docker pull {{ app_image }}"
      changed_when: true

    - name: Pull monitoring images with retry
      ansible.builtin.command:
        cmd: "docker pull {{ item }}"
      register: monitoring_pull_result
      retries: 3
      delay: 5
      until: monitoring_pull_result.rc == 0
      changed_when: true
      loop: "{{ monitoring_images }}"

    - name: Ensure monitoring config and data directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/telco-monitoring/prometheus
        - /opt/telco-monitoring/grafana/provisioning/datasources
        - /opt/telco-monitoring/grafana/provisioning/dashboards
        - /opt/telco-monitoring/grafana/dashboards
        - /opt/telco-monitoring/loki
        - /opt/telco-monitoring/promtail
        - /opt/telco-monitoring/logs
        - /opt/telco-monitoring/caddy
        - /opt/telco-monitoring/caddy/data
        - /opt/telco-monitoring/caddy/config

    - name: Ensure Loki data directories are writable by container user
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "10001"
        group: "10001"
        mode: "0755"
      loop:
        - /opt/telco-monitoring/loki
        - /opt/telco-monitoring/loki/chunks
        - /opt/telco-monitoring/loki/rules
        - /opt/telco-monitoring/loki/index
        - /opt/telco-monitoring/loki/index_cache
        - /opt/telco-monitoring/loki/compactor

    - name: Remove previous app container
      ansible.builtin.command:
        cmd: "docker rm -f {{ app_name }}"
      failed_when: false
      changed_when: false

    - name: Run app container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ app_name }}
          --restart unless-stopped
          -e TELCO_LOG_PATH=/var/log/telco/app.log
          -v /opt/telco-monitoring/logs:/var/log/telco
          -p {{ app_port }}:8000
          {{ app_image }}
      changed_when: true

    - name: Write Prometheus config file
      ansible.builtin.copy:
        dest: /opt/telco-monitoring/prometheus/prometheus.yml
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: "telco-churn-api"
              metrics_path: /metrics
              static_configs:
                - targets: ["{{ app_name }}:8000"]
            - job_name: "node-exporter"
              static_configs:
                - targets: ["node-exporter:9100"]

    - name: Copy Loki config file
      ansible.builtin.copy:
        src: files/monitoring/loki/loki-config.yml
        dest: /opt/telco-monitoring/loki/loki-config.yml
        mode: "0644"

    - name: Copy Promtail config file
      ansible.builtin.copy:
        src: files/monitoring/promtail/promtail-config.yml
        dest: /opt/telco-monitoring/promtail/promtail-config.yml
        mode: "0644"

    - name: Copy Grafana datasource provisioning
      ansible.builtin.copy:
        src: files/monitoring/grafana/provisioning/datasources/datasource.yml
        dest: /opt/telco-monitoring/grafana/provisioning/datasources/datasource.yml
        mode: "0644"

    - name: Copy Grafana dashboards provisioning
      ansible.builtin.copy:
        src: files/monitoring/grafana/provisioning/dashboards/dashboards.yml
        dest: /opt/telco-monitoring/grafana/provisioning/dashboards/dashboards.yml
        mode: "0644"

    - name: Copy API dashboard JSON
      ansible.builtin.copy:
        src: files/monitoring/grafana/dashboards/telco-api-dashboard.json
        dest: /opt/telco-monitoring/grafana/dashboards/telco-api-dashboard.json
        mode: "0644"

    - name: Copy VM dashboard JSON
      ansible.builtin.copy:
        src: files/monitoring/grafana/dashboards/telco-vm-dashboard.json
        dest: /opt/telco-monitoring/grafana/dashboards/telco-vm-dashboard.json
        mode: "0644"

    - name: Ensure monitoring docker network exists
      ansible.builtin.command:
        cmd: docker network create telco-monitoring
      failed_when: false
      changed_when: false

    - name: Connect app container to monitoring network
      ansible.builtin.command:
        cmd: docker network connect telco-monitoring {{ app_name }}
      failed_when: false
      changed_when: false

    - name: Remove previous Prometheus container
      ansible.builtin.command:
        cmd: "docker rm -f {{ prometheus_name }}"
      failed_when: false
      changed_when: false

    - name: Remove previous node-exporter container
      ansible.builtin.command:
        cmd: "docker rm -f node-exporter"
      failed_when: false
      changed_when: false

    - name: Remove previous Loki container
      ansible.builtin.command:
        cmd: "docker rm -f {{ loki_name }}"
      failed_when: false
      changed_when: false

    - name: Remove previous Promtail container
      ansible.builtin.command:
        cmd: "docker rm -f {{ promtail_name }}"
      failed_when: false
      changed_when: false

    - name: Run Prometheus container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ prometheus_name }}
          --restart unless-stopped
          --network telco-monitoring
          -p {{ prometheus_port }}:9090
          -v /opt/telco-monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
          prom/prometheus:latest
          --config.file=/etc/prometheus/prometheus.yml
          --web.external-url=/prometheus
          --web.route-prefix=/
      changed_when: true

    - name: Run node-exporter container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name node-exporter
          --restart unless-stopped
          --network telco-monitoring
          --pid=host
          -p 9100:9100
          -v /:/host:ro,rslave
          quay.io/prometheus/node-exporter:latest
          --path.rootfs=/host
      changed_when: true

    - name: Run Loki container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ loki_name }}
          --restart unless-stopped
          --network telco-monitoring
          -p {{ loki_port }}:3100
          -v /opt/telco-monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
          -v /opt/telco-monitoring/loki:/loki
          grafana/loki:2.9.8
          -config.file=/etc/loki/config.yml
      changed_when: true

    - name: Run Promtail container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ promtail_name }}
          --restart unless-stopped
          --network telco-monitoring
          -v /opt/telco-monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
          -v /opt/telco-monitoring/logs:/var/log/telco:ro
          -v /opt/telco-monitoring/promtail:/tmp
          grafana/promtail:2.9.8
          -config.file=/etc/promtail/config.yml
      changed_when: true

    - name: Remove previous Grafana container
      ansible.builtin.command:
        cmd: "docker rm -f {{ grafana_name }}"
      failed_when: false
      changed_when: false

    - name: Run Grafana container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ grafana_name }}
          --restart unless-stopped
          --network telco-monitoring
          -p {{ grafana_port }}:3000
          -e GF_SECURITY_ADMIN_USER=admin
          -e GF_SECURITY_ADMIN_PASSWORD=admin
          -e GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
          -e GF_SERVER_SERVE_FROM_SUB_PATH=true
          -v /opt/telco-monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
          -v /opt/telco-monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
          grafana/grafana:latest
      changed_when: true

    - name: Validate Caddy variables
      ansible.builtin.assert:
        that:
          - caddy_domain | length > 0
          - acme_email | length > 0
        fail_msg: "Set caddy_domain and acme_email (recommended via GitHub secrets DOMAIN and ACME_EMAIL)."

    - name: Write Caddyfile
      ansible.builtin.copy:
        dest: /opt/telco-monitoring/caddy/Caddyfile
        mode: "0644"
        content: |
          {
            email {{ acme_email }}
          }

          {{ caddy_domain }} {
            encode gzip

            redir /swagger /docs 308
            redir /healthz /health 308
            redir /grafana /grafana/ 308
            redir /prometheus /prometheus/ 308

            handle /grafana* {
              reverse_proxy {{ grafana_name }}:3000
            }

            handle_path /prometheus* {
              reverse_proxy {{ prometheus_name }}:9090
            }

            handle {
              reverse_proxy {{ app_name }}:8000
            }
          }

    - name: Remove previous Caddy container
      ansible.builtin.command:
        cmd: "docker rm -f {{ caddy_name }}"
      failed_when: false
      changed_when: false

    - name: Run Caddy container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ caddy_name }}
          --restart unless-stopped
          --network telco-monitoring
          -p 80:80
          -p 443:443
          -v /opt/telco-monitoring/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
          -v /opt/telco-monitoring/caddy/data:/data
          -v /opt/telco-monitoring/caddy/config:/config
          caddy:2
      changed_when: true
