services:
  app:
    build: .
    container_name: telco-churn-app
    environment:
      - TELCO_LOG_PATH=/var/log/telco/app.log
    volumes:
      - app_logs:/var/log/telco
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: telco-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: telco-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - app_logs:/var/log/telco:ro
      - promtail_positions:/tmp
    depends_on:
      - app
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: telco-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: telco-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: telco-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - prometheus
      - grafana
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  app_logs:
  loki_data:
  promtail_positions:
